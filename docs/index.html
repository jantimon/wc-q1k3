<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wc-q1k3 · Q1K3 WebComponent</title>
    <meta name="description" content="Experimental WebComponent wrapper around Dominic Szablewski's Q1K3 — play it right in your browser." />
    <meta name="color-scheme" content="dark" />

    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/jantimon/wc-q1k3/main/Q1K3.png" />
    <link rel="stylesheet" href="./styles.css" />

    <!-- Web component loaded asynchronously from unpkg -->
    <script src="https://unpkg.com/wc-q1k3" async></script>
  </head>

  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <img
            src="https://raw.githubusercontent.com/jantimon/wc-q1k3/main/Q1K3.png"
            alt="Q1K3 logo"
            class="logo"
            width="32"
            height="32"
          />
          <span class="name">wc-q1k3</span>
        </div>
        <nav class="links" aria-label="External links">
          <a href="https://github.com/jantimon/wc-q1k3" target="_blank" rel="noreferrer noopener">GitHub</a>
          <a href="https://www.npmjs.com/package/wc-q1k3" target="_blank" rel="noreferrer noopener">npm</a>
        </nav>
      </header>

      <main class="stage" aria-label="Game">
        <g-q1k3></g-q1k3>
      </main>

      <footer class="footer">
        <small>Tip: use a desktop browser for best controls.</small>
      </footer>
    </div>
  </body>
</html>
